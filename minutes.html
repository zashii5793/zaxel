<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAXEL | Minutes → Action Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: #f8f9fa; min-height: 100vh; }
    @keyframes spin { to { transform: rotate(360deg); } }
    textarea:focus { border-color: #111 !important; box-shadow: 0 0 0 2px rgba(17,17,17,0.08); }
    tr:hover td { background: #f9fafb !important; }
    select { appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const ANTHROPIC_MODEL = "claude-sonnet-4-20250514";

    const STATUS_CONFIG = {
      未着手: { color: "#e5e7eb", text: "#6b7280" },
      進行中: { color: "#dbeafe", text: "#1d4ed8" },
      完了:   { color: "#d1fae5", text: "#065f46" },
      保留:   { color: "#fef3c7", text: "#92400e" },
      "Not Started": { color: "#e5e7eb", text: "#6b7280" },
      "In Progress": { color: "#dbeafe", text: "#1d4ed8" },
      "Done":        { color: "#d1fae5", text: "#065f46" },
      "On Hold":     { color: "#fef3c7", text: "#92400e" },
    };

    const PRIORITY_CONFIG = {
      高: { color: "#fee2e2", text: "#991b1b" },
      中: { color: "#fef9c3", text: "#854d0e" },
      低: { color: "#f0fdf4", text: "#166534" },
      High:   { color: "#fee2e2", text: "#991b1b" },
      Medium: { color: "#fef9c3", text: "#854d0e" },
      Low:    { color: "#f0fdf4", text: "#166534" },
    };

    const T = {
      ja: {
        subtitle: "MINUTES → ACTION TRACKER",
        heading: "議事録 → アクション抽出",
        desc: "議事録をペーストするだけで、決定事項・TODO・担当者・期日を自動抽出します。",
        placeholder: `例）\n2025年3月7日 プロジェクト定例会議\n出席者：田中（PM）、鈴木（開発）、佐藤（営業）\n\n【議題1】新機能リリース日程\n→ 3月末リリースで合意。田中が3月10日までに仕様書を作成。\n→ 鈴木が環境構築を3月15日までに完了。\n\n【議題2】営業資料の更新\n→ 佐藤が競合比較表を今週中に更新する。\n→ 次回MTGは3月14日13時に決定。`,
        analyze: "解析する →",
        analyzing: "解析中...",
        error: "解析に失敗しました。もう一度お試しください。",
        back: "← 新しい議事録を読み込む",
        completed: "完了",
        summary: "SUMMARY",
        decisions: "DECISIONS — 決定事項",
        actions: "ACTION ITEMS — TODO一覧",
        cols: ["タスク", "担当者", "期日", "優先度", "ステータス"],
        statuses: ["未着手", "進行中", "完了", "保留"],
        prompt: (text) => `以下の議事録を解析し、JSONのみを返してください。前置き・説明・マークダウン記号は一切不要です。

形式:
{
  "summary": "会議の要約（1〜2文）",
  "decisions": ["決定事項1", "決定事項2"],
  "actions": [
    {
      "id": 1,
      "task": "タスク内容",
      "assignee": "担当者名（不明な場合は「未定」）",
      "deadline": "期日（例: 2025/03/15、不明な場合は「未定」）",
      "priority": "高 or 中 or 低",
      "status": "未着手"
    }
  ]
}

議事録:
${text}`,
      },
      en: {
        subtitle: "MINUTES → ACTION TRACKER",
        heading: "Meeting Minutes → Action Extractor",
        desc: "Paste your meeting notes and instantly extract decisions, action items, owners, and deadlines.",
        placeholder: `Example:\nMarch 7, 2025 — Weekly Project Meeting\nAttendees: Tanaka (PM), Suzuki (Dev), Sato (Sales)\n\n[Topic 1] Release schedule\n→ Agreed on end-of-March release. Tanaka to prepare spec doc by Mar 10.\n→ Suzuki to complete environment setup by Mar 15.\n\n[Topic 2] Sales deck update\n→ Sato to update competitive comparison by end of week.\n→ Next meeting: Mar 14 at 1pm.`,
        analyze: "Analyze →",
        analyzing: "Analyzing...",
        error: "Analysis failed. Please try again.",
        back: "← Analyze new minutes",
        completed: "done",
        summary: "SUMMARY",
        decisions: "DECISIONS",
        actions: "ACTION ITEMS",
        cols: ["Task", "Assignee", "Deadline", "Priority", "Status"],
        statuses: ["Not Started", "In Progress", "Done", "On Hold"],
        prompt: (text) => `Analyze the following meeting minutes and return ONLY a JSON object. No preamble, no markdown fences.

Format:
{
  "summary": "1-2 sentence summary of the meeting",
  "decisions": ["Decision 1", "Decision 2"],
  "actions": [
    {
      "id": 1,
      "task": "Task description",
      "assignee": "Person responsible (or 'TBD' if unknown)",
      "deadline": "Deadline (e.g. 2025/03/15, or 'TBD' if unknown)",
      "priority": "High or Medium or Low",
      "status": "Not Started"
    }
  ]
}

Meeting minutes:
${text}`,
      },
    };

    async function analyzeMinutes(text, lang) {
      const t = T[lang];
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: ANTHROPIC_MODEL,
          max_tokens: 1000,
          messages: [{ role: "user", content: t.prompt(text) }],
        }),
      });
      const data = await response.json();
      const raw = data.content?.find((b) => b.type === "text")?.text || "{}";
      return JSON.parse(raw.replace(/```json|```/g, "").trim());
    }

    function App() {
      const [lang, setLang] = useState("ja");
      const [step, setStep] = useState("input");
      const [minutes, setMinutes] = useState("");
      const [result, setResult] = useState(null);
      const [error, setError] = useState("");
      const [editingId, setEditingId] = useState(null);
      const t = T[lang];

      const handleAnalyze = useCallback(async () => {
        if (!minutes.trim()) return;
        setStep("analyzing");
        setError("");
        try {
          const data = await analyzeMinutes(minutes, lang);
          setResult(data);
          setStep("result");
        } catch {
          setError(t.error);
          setStep("input");
        }
      }, [minutes, lang]);

      const updateStatus = (id, status) =>
        setResult((prev) => ({ ...prev, actions: prev.actions.map((a) => a.id === id ? { ...a, status } : a) }));

      const updateField = (id, field, value) =>
        setResult((prev) => ({ ...prev, actions: prev.actions.map((a) => a.id === id ? { ...a, [field]: value } : a) }));

      const completedKey = lang === "ja" ? "完了" : "Done";
      const completedCount = result?.actions?.filter((a) => a.status === completedKey).length || 0;
      const totalCount = result?.actions?.length || 0;
      const progress = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;

      return (
        <div style={{ fontFamily: "'Hiragino Kaku Gothic ProN', Meiryo, sans-serif", background: "#f8f9fa", minHeight: "100vh" }}>
          <header style={{ background: "#fff", borderBottom: "1px solid #e5e7eb", padding: "16px 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <a href="/zaxel/" style={{ display: "flex", alignItems: "center", gap: 12, textDecoration: "none" }}>
              <div style={{ width: 36, height: 36, border: "2px solid #111", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ fontFamily: "Georgia, serif", fontSize: 18, fontWeight: 700, color: "#111" }}>Z</span>
              </div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#111", letterSpacing: "0.05em" }}>ZAXEL</div>
                <div style={{ fontSize: 11, color: "#6b7280", letterSpacing: "0.08em" }}>{t.subtitle}</div>
              </div>
            </a>
            <div style={{ display: "flex", background: "#f3f4f6", borderRadius: 6, padding: 2, gap: 2 }}>
              {["ja", "en"].map((l) => (
                <button key={l} onClick={() => { setLang(l); setResult(null); setStep("input"); setMinutes(""); }}
                  style={{ padding: "5px 14px", borderRadius: 4, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", background: lang === l ? "#111" : "transparent", color: lang === l ? "#fff" : "#6b7280", transition: "all 0.15s" }}>
                  {l === "ja" ? "日本語" : "EN"}
                </button>
              ))}
            </div>
          </header>

          <main style={{ maxWidth: 860, margin: "0 auto", padding: "40px 24px" }}>
            {(step === "input" || step === "analyzing") && (
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 700, color: "#111", marginBottom: 8 }}>{t.heading}</h1>
                <p style={{ fontSize: 14, color: "#6b7280", marginBottom: 28 }}>{t.desc}</p>
                <textarea value={minutes} onChange={(e) => setMinutes(e.target.value)} placeholder={t.placeholder} disabled={step === "analyzing"}
                  style={{ width: "100%", height: 280, padding: "16px", fontSize: 14, lineHeight: 1.7, border: "1px solid #d1d5db", borderRadius: 4, resize: "vertical", outline: "none", background: "#fff", color: "#111" }} />
                {error && <p style={{ color: "#dc2626", fontSize: 13, marginTop: 8 }}>{error}</p>}
                <button onClick={handleAnalyze} disabled={!minutes.trim() || step === "analyzing"}
                  style={{ marginTop: 16, padding: "12px 32px", background: step === "analyzing" ? "#9ca3af" : "#111", color: "#fff", border: "none", borderRadius: 4, fontSize: 14, fontWeight: 600, cursor: step === "analyzing" ? "not-allowed" : "pointer", letterSpacing: "0.05em", display: "flex", alignItems: "center", gap: 8 }}>
                  {step === "analyzing" ? (
                    <><span style={{ display: "inline-block", width: 14, height: 14, border: "2px solid rgba(255,255,255,0.3)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />{t.analyzing}</>
                  ) : t.analyze}
                </button>
              </div>
            )}

            {step === "result" && result && (
              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28 }}>
                  <button onClick={() => { setStep("input"); setResult(null); setMinutes(""); }}
                    style={{ background: "none", border: "none", color: "#6b7280", fontSize: 13, cursor: "pointer", padding: 0 }}>{t.back}</button>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 13, color: "#6b7280" }}>{completedCount}/{totalCount} {t.completed}</span>
                    <div style={{ width: 120, height: 6, background: "#e5e7eb", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ width: `${progress}%`, height: "100%", background: "#111", transition: "width 0.4s ease" }} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#111" }}>{progress}%</span>
                  </div>
                </div>

                <div style={{ background: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, padding: "16px 20px", marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", letterSpacing: "0.1em", marginBottom: 6 }}>{t.summary}</div>
                  <p style={{ fontSize: 14, color: "#374151", lineHeight: 1.7, margin: 0 }}>{result.summary}</p>
                </div>

                {result.decisions?.length > 0 && (
                  <div style={{ background: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, padding: "16px 20px", marginBottom: 20 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", letterSpacing: "0.1em", marginBottom: 10 }}>{t.decisions}</div>
                    <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
                      {result.decisions.map((d, i) => (
                        <li key={i} style={{ fontSize: 14, color: "#374151", padding: "4px 0 4px 16px", position: "relative", lineHeight: 1.6 }}>
                          <span style={{ position: "absolute", left: 0, color: "#111", fontWeight: 700 }}>·</span>{d}
                        </li>
                      ))}
                    </ul>
                  </div>
                )}

                <div style={{ background: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, overflow: "hidden" }}>
                  <div style={{ padding: "16px 20px", borderBottom: "1px solid #e5e7eb" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", letterSpacing: "0.1em" }}>{t.actions}</span>
                  </div>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ background: "#f9fafb" }}>
                        {t.cols.map((h) => (
                          <th key={h} style={{ padding: "10px 16px", fontSize: 11, fontWeight: 700, color: "#9ca3af", textAlign: "left", letterSpacing: "0.05em", borderBottom: "1px solid #e5e7eb" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {result.actions.map((action, i) => (
                        <tr key={action.id} style={{ borderBottom: i < result.actions.length - 1 ? "1px solid #f3f4f6" : "none", background: action.status === completedKey ? "#fafafa" : "#fff" }}>
                          <td style={{ padding: "12px 16px", fontSize: 13, color: action.status === completedKey ? "#9ca3af" : "#111", textDecoration: action.status === completedKey ? "line-through" : "none", lineHeight: 1.5, maxWidth: 280 }}>{action.task}</td>
                          <td style={{ padding: "12px 16px", fontSize: 13, color: "#374151", whiteSpace: "nowrap" }}>
                            {editingId === action.id ? (
                              <input defaultValue={action.assignee} onBlur={(e) => { updateField(action.id, "assignee", e.target.value); setEditingId(null); }} autoFocus
                                style={{ border: "1px solid #d1d5db", borderRadius: 3, padding: "2px 6px", fontSize: 13, width: 90 }} />
                            ) : (
                              <span onClick={() => setEditingId(action.id)} style={{ cursor: "pointer", borderBottom: "1px dashed #d1d5db" }}>{action.assignee}</span>
                            )}
                          </td>
                          <td style={{ padding: "12px 16px", fontSize: 13, color: "#374151", whiteSpace: "nowrap" }}>{action.deadline}</td>
                          <td style={{ padding: "12px 16px", whiteSpace: "nowrap" }}>
                            <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 3, background: (PRIORITY_CONFIG[action.priority] || {}).color || "#f3f4f6", color: (PRIORITY_CONFIG[action.priority] || {}).text || "#374151" }}>{action.priority}</span>
                          </td>
                          <td style={{ padding: "12px 16px", whiteSpace: "nowrap" }}>
                            <select value={action.status} onChange={(e) => updateStatus(action.id, e.target.value)}
                              style={{ fontSize: 11, fontWeight: 700, padding: "3px 8px", borderRadius: 3, border: "none", cursor: "pointer", background: (STATUS_CONFIG[action.status] || {}).color || "#e5e7eb", color: (STATUS_CONFIG[action.status] || {}).text || "#374151" }}>
                              {t.statuses.map((s) => <option key={s}>{s}</option>)}
                            </select>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
